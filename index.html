<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Pro Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .canvas-container {
            position: relative;
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 2px solid #334155;
            cursor: crosshair;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #drop-zone.dragover { border-color: #3b82f6; background: #1e293b; transform: scale(1.01); }
        .control-panel { background: rgba(30, 41, 59, 0.8); backdrop-blur: 12px; }
        input[type="range"] { accent-color: #3b82f6; }
        #canvasWrapper { transform-origin: center; transition: transform 0.1s ease; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-6xl w-full space-y-6">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">
                    MAGIC CHROMA PRO
                </h1>
                <p class="text-gray-400 text-sm">Professional level background removal tool</p>
            </div>
            <div class="flex gap-2">
                <button id="zoomOut" class="bg-slate-700 p-2 rounded hover:bg-slate-600">-</button>
                <span id="zoomLevel" class="self-center px-2 text-xs">100%</span>
                <button id="zoomIn" class="bg-slate-700 p-2 rounded hover:bg-slate-600">+</button>
            </div>
        </header>

        <!-- Drag and Drop Area -->
        <div id="drop-zone" class="border-2 border-dashed border-slate-600 rounded-2xl p-8 text-center transition-all cursor-pointer hover:border-blue-500 bg-slate-800/40">
            <input type="file" id="mediaInput" accept="video/*,image/*" class="hidden">
            <div id="upload-prompt" class="space-y-2">
                <p class="text-lg font-bold">Video/Image Drop Karein</p>
                <p class="text-xs text-gray-500 italic">Click karein ya file drag karein</p>
            </div>
            <div id="file-info" class="hidden flex items-center justify-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                <p class="text-blue-400 font-bold" id="file-name"></p>
            </div>
        </div>

        <!-- Professional Controls -->
        <div class="control-panel p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <!-- Color Selector -->
                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase text-blue-400 tracking-widest">Key Color</label>
                    <div class="flex gap-2">
                        <input type="color" id="keyColor" value="#00ff00" class="flex-1 h-10 bg-transparent border-none cursor-pointer">
                        <button id="eyeDropper" title="Pick color from screen" class="bg-blue-600 px-3 rounded text-white text-xs hover:bg-blue-500">
                            Pick
                        </button>
                    </div>
                </div>

                <!-- Range Sliders -->
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <label class="text-[10px] font-black uppercase text-emerald-400 tracking-widest">Similarity</label>
                        <span id="simVal" class="text-[10px]">50</span>
                    </div>
                    <input type="range" id="similarity" min="0" max="100" value="50" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between">
                        <label class="text-[10px] font-black uppercase text-purple-400 tracking-widest">Smoothness</label>
                        <span id="smoothVal" class="text-[10px]">10</span>
                    </div>
                    <input type="range" id="smoothness" min="0" max="100" value="10" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>

                <!-- Export -->
                <div class="flex items-end">
                    <button id="downloadBtn" disabled class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 disabled:opacity-30 text-white font-black py-3 rounded-xl transition-all shadow-lg active:scale-95">
                        DOWNLOAD EXPORT
                    </button>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 pt-4 border-t border-slate-700/50">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] uppercase text-gray-500">Preview Background:</span>
                    <button class="bg-black w-5 h-5 rounded-full border border-white/20 preview-bg" data-bg="transparent"></button>
                    <button class="bg-white w-5 h-5 rounded-full border border-white/20 preview-bg" data-bg="#ffffff"></button>
                    <button class="bg-green-600 w-5 h-5 rounded-full border border-white/20 preview-bg" data-bg="#16a34a"></button>
                    <button class="bg-blue-600 w-5 h-5 rounded-full border border-white/20 preview-bg" data-bg="#2563eb"></button>
                </div>
            </div>
        </div>

        <!-- Canvas Container -->
        <div id="mainContainer" class="canvas-container rounded-3xl overflow-hidden">
            <div id="canvasWrapper">
                <canvas id="outputCanvas" class="max-w-full"></canvas>
            </div>
            <!-- Hidden Helpers -->
            <video id="sourceVideo" crossorigin="anonymous" class="hidden" loop muted playsinline></video>
            <img id="sourceImage" crossorigin="anonymous" class="hidden">
        </div>
        
        <div id="recordingUI" class="hidden fixed inset-0 bg-slate-900/90 flex items-center justify-center z-50">
            <div class="text-center space-y-4">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
                <p class="text-xl font-bold">Exporting Video...</p>
                <p class="text-gray-400 text-sm">Please keep the tab open</p>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const mediaInput = document.getElementById('mediaInput');
        const sourceVideo = document.getElementById('sourceVideo');
        const sourceImage = document.getElementById('sourceImage');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const canvasWrapper = document.getElementById('canvasWrapper');
        
        const keyColorInput = document.getElementById('keyColor');
        const similarityInput = document.getElementById('similarity');
        const smoothnessInput = document.getElementById('smoothness');
        const downloadBtn = document.getElementById('downloadBtn');
        const recordingUI = document.getElementById('recordingUI');
        const eyeDropperBtn = document.getElementById('eyeDropper');

        let mediaType = 'video';
        let animationFrameId;
        let zoom = 1;

        // UI Helpers
        const updateVal = (id, val) => document.getElementById(id).innerText = val;
        similarityInput.oninput = (e) => { updateVal('simVal', e.target.value); refresh(); };
        smoothnessInput.oninput = (e) => { updateVal('smoothVal', e.target.value); refresh(); };
        keyColorInput.oninput = () => refresh();

        // Zoom Logic
        document.getElementById('zoomIn').onclick = () => { zoom += 0.1; updateZoom(); };
        document.getElementById('zoomOut').onclick = () => { zoom = Math.max(0.1, zoom - 0.1); updateZoom(); };
        function updateZoom() {
            canvasWrapper.style.transform = `scale(${zoom})`;
            document.getElementById('zoomLevel').innerText = Math.round(zoom * 100) + '%';
        }

        // Preview Backgrounds
        document.querySelectorAll('.preview-bg').forEach(btn => {
            btn.onclick = () => {
                const bg = btn.dataset.bg;
                const container = document.getElementById('mainContainer');
                if(bg === 'transparent') {
                    container.style.backgroundImage = '';
                    container.style.backgroundColor = '';
                } else {
                    container.style.backgroundImage = 'none';
                    container.style.backgroundColor = bg;
                }
            };
        });

        // Eye Dropper Feature (Modern Browser Support)
        eyeDropperBtn.onclick = async () => {
            if (!window.EyeDropper) {
                alert("Apka browser EyeDropper support nahi karta. Manually color select karein.");
                return;
            }
            const dropper = new EyeDropper();
            try {
                const result = await dropper.open();
                keyColorInput.value = result.sRGBHex;
                refresh();
            } catch (e) {}
        };

        // File Loading
        dropZone.onclick = () => mediaInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        };
        mediaInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            document.getElementById('upload-prompt').classList.add('hidden');
            document.getElementById('file-info').classList.remove('hidden');
            document.getElementById('file-name').innerText = file.name;
            
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            const url = URL.createObjectURL(file);

            if (file.type.startsWith('video/')) {
                mediaType = 'video';
                sourceImage.classList.add('hidden');
                sourceVideo.src = url;
                sourceVideo.onloadedmetadata = () => {
                    canvas.width = sourceVideo.videoWidth;
                    canvas.height = sourceVideo.videoHeight;
                    downloadBtn.disabled = false;
                    sourceVideo.play();
                };
            } else {
                mediaType = 'image';
                sourceVideo.pause();
                sourceVideo.classList.add('hidden');
                sourceImage.src = url;
                sourceImage.onload = () => {
                    canvas.width = sourceImage.naturalWidth;
                    canvas.height = sourceImage.naturalHeight;
                    downloadBtn.disabled = false;
                    renderStatic();
                };
            }
        }

        function refresh() {
            if (mediaType === 'image') renderStatic();
        }

        sourceVideo.addEventListener('play', () => {
            if (mediaType === 'video') renderLoop();
        });

        function renderLoop() {
            if (mediaType !== 'video' || sourceVideo.paused || sourceVideo.ended) return;
            processFrame(sourceVideo);
            animationFrameId = requestAnimationFrame(renderLoop);
        }

        function renderStatic() {
            if (mediaType === 'image') processFrame(sourceImage);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        function processFrame(source) {
            ctx.drawImage(source, 0, 0, canvas.width, canvas.height);
            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = frame.data;

            const target = hexToRgb(keyColorInput.value);
            const similarity = parseFloat(similarityInput.value) * 2; // Scaled for better range
            const smoothness = parseFloat(smoothnessInput.value) * 1.5;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i + 0];
                const g = data[i + 1];
                const b = data[i + 2];

                // Delta distance
                const distance = Math.sqrt(
                    Math.pow(r - target.r, 2) +
                    Math.pow(g - target.g, 2) +
                    Math.pow(b - target.b, 2)
                );

                if (distance < similarity) {
                    data[i + 3] = 0;
                } else if (distance < similarity + smoothness) {
                    data[i + 3] = ((distance - similarity) / smoothness) * 255;
                }
            }
            ctx.putImageData(frame, 0, 0);
        }

        // Click to Pick Color from Canvas
        canvas.addEventListener('mousedown', (e) => {
            if (mediaType === 'video' && sourceVideo.paused) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            // Temporary draw to pick original color
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(mediaType === 'video' ? sourceVideo : sourceImage, 0, 0);
            
            const p = tCtx.getImageData(x, y, 1, 1).data;
            const hex = "#" + ("000000" + ((p[0] << 16) | (p[1] << 8) | p[2]).toString(16)).slice(-6);
            keyColorInput.value = hex;
            refresh();
        });

        downloadBtn.onclick = () => {
            if (mediaType === 'image') {
                const link = document.createElement('a');
                link.download = 'cutout_' + Date.now() + '.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } else {
                exportVideo();
            }
        };

        function exportVideo() {
            const chunks = [];
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'magic_export.webm';
                link.click();
                recordingUI.classList.add('hidden');
                downloadBtn.disabled = false;
            };

            sourceVideo.currentTime = 0;
            sourceVideo.play();
            recorder.start();
            recordingUI.classList.remove('hidden');
            downloadBtn.disabled = true;

            sourceVideo.onended = () => recorder.stop();
            // Max duration safety
            setTimeout(() => { if(recorder.state === 'recording') recorder.stop(); }, (sourceVideo.duration * 1000) + 2000);
        }
    </script>
</body>
</html>
